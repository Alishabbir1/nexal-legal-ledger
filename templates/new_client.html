{% extends "base.html" %}

{% block page_title %}New Client{% endblock %}

{% block content %}
<div class="card">
    <h2>New Client</h2>
    <p style="margin:8px 0 20px; color:var(--text-secondary); font-size:13.5px;">
        Client code is generated automatically and cannot be changed.
    </p>
    <form id="new_client_form" method="POST" action="{{ url_for('new_client') }}" style="max-width:560px; margin-top:16px;">
        <div class="form-group">
            <label>Client Code</label>
            <div style="padding:10px 12px; background:var(--bg-elevated); border:1px solid var(--border-subtle); border-radius:var(--r-sm); font-weight:600; font-family:var(--font-mono); color:var(--text-muted); cursor:not-allowed; user-select:none; font-size:13px;">
                {{ auto_client_code }}
            </div>
        </div>
        <div class="form-group">
            <label>Client Name <span style="color:var(--danger); font-size:11px;">required</span></label>
            <input type="text" name="client_name" id="client_name" required maxlength="200" value="{{ client_name or '' }}">
        </div>
        <div class="form-group">
            <label>Matter Reference</label>
            <input type="text" name="matter_reference" maxlength="50" value="{{ matter_reference or '' }}">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description">{{ description or '' }}</textarea>
        </div>
        <div style="display:flex; gap:10px; margin-top:4px;">
            <input type="submit" id="submit_btn" class="btn" value="Save Client">
            <a href="{{ url_for('client_ledger') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% block extra_js %}
<script>
(function() {
    var form = document.getElementById('new_client_form');
    var btn  = document.getElementById('submit_btn');
    if (form && btn) {
        form.addEventListener('submit', function() {
            btn.disabled = true;
            btn.value = 'Saving…';
        });
    }
})();
</script>
{% endblock %}
{% endblock %}
